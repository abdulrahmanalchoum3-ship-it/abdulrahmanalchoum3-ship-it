<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مساعد عبد الرحمن</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 50px; }
        .box { background: #1e293b; padding: 30px; border-radius: 15px; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #output { background: #334155; padding: 15px; border-radius: 10px; min-height: 150px; margin: 20px 0; white-space: pre-wrap; border: 1px solid #475569; }
        input { width: 75%; padding: 12px; border-radius: 8px; border: none; }
        button { padding: 12px 20px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .back { display: block; text-align: center; margin-top: 20px; color: #94a3b8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#38bdf8; text-align:center;">🤖 دردشة الذكاء الاصطناعي</h2>
        <div id="output">تفضل اسألني...</div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="msg" placeholder="اكتب هنا...">
            <button onclick="send()">إرسال</button>
        </div>
        <a href="/" class="back">🏠 العودة للرئيسية</a>
    </div>
    <script>
        async function send() {
            const m = document.getElementById('msg').value;
            const o = document.getElementById('output');
            if(!m) return;
            o.innerText = "جاري التفكير...";
            const res = await fetch(`/stream?user_input=${encodeURIComponent(m)}`);
            const reader = res.body.getReader();
            const dec = new TextDecoder();
            o.innerText = "";
            while(true) {
                const {done, value} = await reader.read();
                if(done) break;
                o.innerText += dec.decode(value);
            }
        }
    </script>
</body>
</html>
