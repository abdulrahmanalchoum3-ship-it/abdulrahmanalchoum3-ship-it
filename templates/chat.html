<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | عبدالرحمن الصانع سوري</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff; margin: 0; display: flex; height: 100vh; flex-direction: column; }
        .header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px 10%; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 16px; line-height: 1.6; }
        .u { align-self: flex-end; background: #e9eef6; color: #1f1f1f; }
        .b { align-self: flex-start; background: transparent; color: #1f1f1f; }
        .input-area { padding: 20px 10%; }
        .input-box { background: #f0f4f9; border-radius: 30px; padding: 5px 20px; display: flex; align-items: center; }
        input { flex: 1; border: none; background: transparent; padding: 12px; outline: none; font-size: 16px; }
        .back-btn { text-decoration: none; color: #1a73e8; font-weight: bold; }
    </style>
</head>
<body>
<div class="header">
    <span style="font-weight:bold;">عبدالرحمن AI</span>
    <a href="/" class="back-btn">🏠 الرئيسية</a>
</div>
<div id="chat-window">
    <div class="msg b">مرحباً! أنا مساعدك الذكي لعام 2026. كيف أخدمك؟</div>
</div>
<div class="input-area">
    <div class="input-box">
        <input type="text" id="inp" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter') send()">
    </div>
    <p style="text-align:center; font-size:10px; color:#aaa; margin-top:10px;">بواسطة المبرمج عبدالرحمن الصانع سوري</p>
</div>
<script>
    async function send() {
        const inp = document.getElementById('inp'); if(!inp.value.trim()) return;
        const txt = inp.value; inp.value = "";
        add(txt, 'u'); const b = add("...", 'b');
        const res = await fetch(`/stream?user_input=${encodeURIComponent(txt)}`);
        const reader = res.body.getReader(); b.innerText = "";
        while(true) {
            const {done, value} = await reader.read(); if(done) break;
            b.innerText += new TextDecoder().decode(value);
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        }
    }
    function add(t, c) {
        const d = document.createElement('div'); d.className = `msg ${c}`; d.innerText = t;
        document.getElementById('chat-window').appendChild(d);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        return d;
    }
</script>
</body>
</html>
