<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة عبد الرحمن AI 🇸🇾</title>
    <style>
        body { font-family: sans-serif; background: #0b0e11; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1e2329; padding: 15px; border-bottom: 1px solid #f0b90b; display: flex; justify-content: space-between; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 8px; }
        .user { align-self: flex-end; background: #f0b90b; color: black; font-weight: bold; }
        .bot { align-self: flex-start; background: #2b3139; border: 1px solid #474d57; }
        .input-area { background: #1e2329; padding: 15px; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; background: #2b3139; border: 1px solid #474d57; color: white; padding: 10px; border-radius: 5px; }
        button { background: #f0b90b; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<header>
    <span>المنصة الذكية 🇸🇾</span>
    <button onclick="newChat()" style="background:#eb4d4b; color:white;">🗑️ مسح</button>
</header>
<div id="chat-box"><div class="msg bot">أهلاً يا بطل! ارفع صورة أو اسألني عن أي شيء 🚀</div></div>
<div class="input-area">
    <input type="file" id="file-inp" style="display:none;" onchange="alert('تم اختيار الصورة! اطلب مني تحويلها لفيديو الآن.')">
    <button onclick="document.getElementById('file-inp').click()" style="background:#474d57;">📎</button>
    <input type="text" id="inp" placeholder="اسألني أو اطلب فيديو..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">إرسال ✈️</button>
</div>
<script>
    async function send() {
        const inp = document.getElementById('inp');
        const box = document.getElementById('chat-box');
        if(!inp.value.trim()) return;
        const txt = inp.value;
        box.innerHTML += `<div class="msg user">${txt}</div>`;
        inp.value = '';
        const resDiv = document.createElement('div');
        resDiv.className = 'msg bot';
        resDiv.innerText = "جاري المعالجة... 🧠";
        box.appendChild(resDiv);
        box.scrollTop = box.scrollHeight;
        
        const response = await fetch(`/stream?user_input=${encodeURIComponent(txt)}`);
        const reader = response.body.getReader();
        resDiv.innerText = "";
        while(true) {
            const {done, value} = await reader.read();
            if(done) break;
            resDiv.innerText += new TextDecoder().decode(value);
            box.scrollTop = box.scrollHeight;
        }
    }
    function newChat() { fetch('/new_chat').then(() => location.reload()); }
</script>
</body>
</html>
