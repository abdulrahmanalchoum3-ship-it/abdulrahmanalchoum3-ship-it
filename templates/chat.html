<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة ذكية | صناعة سورية 🇸🇾</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0e11; color: #eaecef; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1e2329; padding: 15px; text-align: center; border-bottom: 1px solid #f0b90b; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px; border-radius: 10px; line-height: 1.5; word-wrap: break-word; }
        .user { align-self: flex-end; background: #f0b90b; color: black; font-weight: bold; }
        .assistant { align-self: flex-start; background: #2b3139; border: 1px solid #474d57; }
        pre { background: #000; padding: 10px; border-radius: 5px; overflow-x: auto; direction: ltr; text-align: left; border: 1px solid #f0b90b; }
        code { color: #f0b90b; }
        .input-area { background: #1e2329; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #474d57; }
        input { flex: 1; background: #2b3139; border: 1px solid #474d57; color: white; padding: 12px; border-radius: 5px; outline: none; }
        input:focus { border-color: #f0b90b; }
        button { background: #f0b90b; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .new-chat-btn { background: #eb4d4b; color: white; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <span style="color: #f0b90b; font-weight: bold;">المنصة الذكية 🇸🇾</span>
    <button class="new-chat-btn" onclick="newChat()">🗑️ محادثة جديدة</button>
</header>

<div id="chat-box">
    <div class="message assistant">أهلاً بك يا بطل! أنا جاهز لمساعدتك في الأكواد، الأسهم، أو أي شيء يدور في بالك.. اطلب وتمنى 🚀🔥</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button onclick="sendMessage()">إرسال ✈️</button>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        if (!input.value.trim()) return;

        // إضافة رسالة المستخدم
        const userDiv = document.createElement('div');
        userDiv.className = 'message user';
        userDiv.innerText = input.value;
        chatBox.appendChild(userDiv);

        const prompt = input.value;
        input.value = '';

        // إضافة رسالة البوت (فارغة حالياً)
        const botDiv = document.createElement('div');
        botDiv.className = 'message assistant';
        botDiv.innerHTML = "<i>جاري التفكير... 🧠</i>";
        chatBox.appendChild(botDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch(`/stream?user_input=${encodeURIComponent(prompt)}`);
            const reader = response.body.getReader();
            botDiv.innerHTML = ""; // مسح كلمة جاري التفكير
            
            let fullText = "";
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = new TextDecoder().decode(value);
                fullText += chunk;
                
                // تحويل الأكواد البرمجية لشكل جميل
                botDiv.innerHTML = formatText(fullText);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        } catch (e) {
            botDiv.innerText = "⚠️ عذراً، السيرفر مشغول. حاول مرة ثانية!";
        }
    }

    function formatText(text) {
        // تنسيق بسيط للأكواد التي تبدأ بـ ```
        return text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>').replace(/\n/g, '<br>');
    }

    function newChat() {
        if(confirm("هل تريد مسح المحادثة والبدء من جديد؟")) {
            fetch('/new_chat').then(() => {
                document.getElementById('chat-box').innerHTML = '<div class="message assistant">تم بدء محادثة جديدة.. كيف أساعدك اليوم؟ 🚀</div>';
            });
        }
    }
</script>

</body>
</html>
