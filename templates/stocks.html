<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>الأسهم | عبدالرحمن AI</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; text-align: center; }
        .card { background: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        input { width: 85%; padding: 15px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 20px; font-size: 16px; }
        .btn { background: #f0b90b; color: black; border: none; padding: 15px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 90%; }
        #res-box { margin-top: 30px; padding: 20px; background: #fafafa; border-radius: 12px; text-align: right; color: #000; white-space: pre-wrap; line-height: 1.8; }
    </style>
</head>
<body>
<div class="card">
    <a href="/" style="color:#888; text-decoration:none; display:block; text-align:right;">⬅️ الرئيسية</a>
    <h2>📈 الأسهم والعقارات</h2>
    <input type="text" id="target-input" placeholder="اكتب اسم السهم أو المنطقة...">
    <button class="btn" onclick="startAnalysis()">تحليل 🔍</button>
    <div id="res-box">النتائج ستظهر هنا بالأسود الواضح... 📊</div>
</div>
<script>
    async function startAnalysis() {
        const target = document.getElementById('target-input').value;
        const resBox = document.getElementById('res-box');
        if (!target) return;
        resBox.innerText = "جاري التحليل... ⏳";
        try {
            const response = await fetch(`/stream_stocks?target=${encodeURIComponent(target)}`);
            const reader = response.body.getReader(); resBox.innerText = "";
            while (true) {
                const {done, value} = await reader.read(); if (done) break;
                resBox.innerText += new TextDecoder().decode(value);
            }
        } catch (e) { resBox.innerText = "⚠️ خطأ في الاتصال بالسيرفر."; }
    }
</script>
</body>
</html>
