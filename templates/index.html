<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>التحقق | عبدالرحمن AI</title>
    <style>
        body { font-family: sans-serif; background: #0b0e11; color: white; text-align: center; margin: 0; }
        .overlay { position: fixed; top: 0; width: 100%; height: 100%; background: #0b0e11; display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal { background: #1e2329; padding: 30px; border-radius: 15px; border: 2px solid #f0b90b; width: 85%; max-width: 400px; }
        .btn { background: #f0b90b; color: black; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #2b3139; border: 1px solid #474d57; color: white; border-radius: 5px; outline: none; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div id="step-check" class="overlay">
    <div class="modal">
        <h2>مرحباً بك / Welcome</h2>
        <input type="text" id="username" placeholder="أدخل اسمك / Enter Name">
        <input type="number" id="age" placeholder="العمر / Age">
        <p style="font-size: 11px; color: #848e9c;">* يمنع دخول من هم دون الـ 10 سنوات</p>
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="validate('ar')">العربية 🇸🇾</button>
            <button class="btn" style="background:#444; color:white;" onclick="validate('en')">English 🇺🇸</button>
        </div>
    </div>
</div>
<div id="main-content" class="hidden" style="padding:40px 20px;">
    <h1 id="welcome-msg" style="color:#f0b90b;"></h1>
    <div style="margin: 20px auto; max-width: 500px; background: #1e2329; padding: 25px; border-radius: 15px; border: 1px solid #f0b90b;">
        <a href="{{ support_link }}" target="_blank" class="btn" style="text-decoration:none; display:block;">🎁 سجل لدعمنا 🚀</a>
    </div>
    <div style="display:flex; justify-content:center; gap:20px;">
        <button class="btn" style="width:150px; background:#2ebd85; color:white;" onclick="location.href='/chat_page'">💬 الدردشة</button>
        <button class="btn" style="width:150px;" onclick="location.href='/stocks_page'">📈 الأسهم</button>
    </div>
</div>
<script>
    window.onload = () => { if(localStorage.getItem('app_entered') === 'true') showMain(); };
    function validate(lang) {
        const name = document.getElementById('username').value;
        const age = parseInt(document.getElementById('age').value);
        if(!name || isNaN(age)) { alert("يرجى إكمال البيانات!"); return; }
        if(age < 10) { alert("عذراً، الدخول للمنصة +10 سنوات فقط!"); return; }
        localStorage.setItem('app_entered', 'true'); localStorage.setItem('user_name', name); localStorage.setItem('user_lang', lang);
        showMain();
    }
    function showMain() {
        document.getElementById('step-check').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        const name = localStorage.getItem('user_name'); const lang = localStorage.getItem('user_lang');
        document.getElementById('welcome-msg').innerText = lang === 'ar' ? `أهلاً بك يا ${name} 🚀` : `Welcome, ${name} 🚀`;
    }
</script>
</body>
</html>
