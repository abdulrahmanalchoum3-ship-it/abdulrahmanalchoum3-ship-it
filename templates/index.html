<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة عبد الرحمن AI | 🇸🇾</title>
    <style>
        body { font-family: sans-serif; background-color: #0b0e11; color: #eaecef; margin: 0; text-align: center; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: #1e2329; padding: 30px; border-radius: 15px; max-width: 400px; width: 85%; border: 2px solid #f0b90b; }
        .btn { background: #f0b90b; color: black; border: none; padding: 12px; margin: 10px 0; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { background: #fcd535; transform: scale(1.02); }
        .hidden { display: none; }
        .support-box { background: #1e2329; color: #f0b90b; padding: 20px; border-radius: 12px; border: 1px solid #f0b90b; margin: 20px auto; max-width: 600px; }
        footer { margin-top: 50px; padding: 20px; border-top: 1px solid #2b3139; color: #848e9c; }
    </style>
</head>
<body>

<div id="step-lang" class="overlay">
    <div class="modal">
        <h2>اختر اللغة / Language</h2>
        <button class="btn" onclick="nextStep('lang', 'ar')">العربية 🇸🇾</button>
        <button class="btn" onclick="nextStep('lang', 'en')">English 🇺🇸</button>
    </div>
</div>

<div id="step-gender" class="overlay hidden">
    <div class="modal">
        <h2 id="gender-title">هل أنت ولد أم بنت؟</h2>
        <button class="btn" onclick="nextStep('gender', 'boy')">ولد 👦</button>
        <button class="btn" onclick="nextStep('gender', 'girl')">بنت 👧</button>
    </div>
</div>

<div id="step-auth" class="overlay hidden">
    <div class="modal">
        <h2 id="auth-title">التسجيل المضمون</h2>
        <div id="auth-options">
            <button class="btn" style="background: white;" onclick="finish()">Google</button>
            <button class="btn" onclick="showEmail()">بالبريد الإلكتروني</button>
        </div>
        <div id="email-box" class="hidden">
            <input type="email" id="u-email" placeholder="أدخل إيميلك" style="width:90%; padding:10px; margin-bottom:10px; border-radius:5px;">
            <button class="btn" onclick="submitEmail()">تأكيد 📧</button>
        </div>
    </div>
</div>

<div id="main-content" class="hidden" style="padding: 20px;">
    <h1 style="color:#f0b90b;">منصة عبد الرحمن AI 🚀</h1>
    <div class="support-box">
        <h3 id="support-text">🎁 إذا حاب تدعمنا بس ادخل سجل دخول ولا تخاف الموقع مضمون</h3>
        <a href="{{ support_link }}" target="_blank" class="btn" style="text-decoration:none; display:inline-block; width:auto; padding:10px 20px;">سجل دخولك من هنا لدعمنا 🚀</a>
    </div>
    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
        <button class="btn" style="max-width: 200px;" onclick="location.href='/stocks_page'">📈 تحليل الأسهم</button>
        <button class="btn" style="max-width: 200px; background: #2ebd85; color: white;" onclick="location.href='/chat_page'">💬 ابدأ الدردشة</button>
    </div>
    <footer>
        <p>تصميم وبرمجة: <span style="color:#f0b90b;">عبد الرحمن</span></p>
        <p>🇸🇾 صناعة سورية | <a href="mailto:abdulrahmanalchoum3@gmail.com" style="color:#f0b90b;">abdulrahmanalchoum3@gmail.com</a></p>
    </footer>
</div>

<script>
    let userData = {};
    function nextStep(step, val) {
        userData[step] = val;
        if(step==='lang') {
            document.getElementById('step-lang').classList.add('hidden');
            document.getElementById('step-gender').classList.remove('hidden');
        } else if(step==='gender') {
            document.getElementById('step-gender').classList.add('hidden');
            document.getElementById('step-auth').classList.remove('hidden');
        }
    }
    function showEmail() {
        document.getElementById('auth-options').classList.add('hidden');
        document.getElementById('email-box').classList.remove('hidden');
    }
    function submitEmail() {
        if(document.getElementById('u-email').value) {
            alert("تم إرسال رسالة التأكيد! يمكنك الدخول الآن.");
            finish();
        }
    }
    function finish() {
        document.getElementById('step-auth').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
    }
</script>
</body>
</html>
